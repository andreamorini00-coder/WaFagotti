body{font-family:Georgia,serif;background:linear-gradient(135deg,#1a1207 0%,#2d1f0a 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}

.wrap{width:100%;max-width:430px}
.brand{text-align:center;margin-bottom:20px;position:relative}

.wa-status{color:#9de0bb;font-family:sans-serif;font-size:12px}
.chat{height:420px;overflow-y:auto;padding:14px;display:flex;flex-direction:column}
.bot-row{display:flex;align-items:flex-end;gap:8px;margin-bottom:8px;animation:fadeUp .3s ease}
.bot-avatar{width:32px;height:32px;border-radius:50%;background:#1a1207;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.bot-bubble{background:#fff;border-radius:18px 18px 18px 4px;padding:10px 14px;max-width:285px;box-shadow:0 1px 4px rgba(0,0,0,.08);font-family:sans-serif;font-size:14px;line-height:1.6;color:#1a1207;white-space:pre-line}
.user-row{display:flex;justify-content:flex-end;margin-bottom:8px;animation:fadeUp .2s ease}
.user-bubble{background:#c9a84c;border-radius:18px 18px 4px 18px;padding:10px 14px;max-width:260px;font-family:sans-serif;font-size:14px;color:#fff;line-height:1.5;font-weight:500}
.typing{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.typing-bubble{background:#fff;border-radius:18px 18px 18px 4px;padding:10px 16px;box-shadow:0 1px 4px rgba(0,0,0,.08);display:flex;gap:4px}
.dot{width:7px;height:7px;border-radius:50%;background:#aaa}
.controls{background:#fff;padding:14px;border-top:1px solid #e0d8cc;max-height:270px;overflow-y:auto}
.chips{display:flex;flex-wrap:wrap;gap:7px}
.chip{padding:8px 13px;border-radius:20px;border:2px solid #e0d8cc;background:#fff;color:#555;font-family:sans-serif;font-size:13px;cursor:pointer;transition:all .15s;display:flex;flex-direction:column;align-items:flex-start;gap:1px;margin-bottom:2px}
.chip:active,.chip:hover{border-color:#c9a84c;background:#fdf5e0;color:#1a1207;font-weight:700}
.chip-sub{font-size:11px;color:#aaa;font-weight:400}
.bigbtn{width:100%;padding:13px 16px;border-radius:12px;border:2px solid #e0d8cc;background:#fff;color:#1a1207;font-family:sans-serif;font-size:14px;cursor:pointer;display:flex;align-items:center;gap:10;text-align:left;margin-bottom:8px;transition:all .15s}
.bigbtn:active{border-color:#c9a84c;background:#fdf5e0}
.bigbtn-emoji{font-size:22px}
.bigbtn-label{font-weight:700}

.text-row{display:flex;gap:8px;margin-bottom:8px}
.txt-input{flex:1;padding:11px 14px;border-radius:12px;border:1px solid #e0d8cc;font-family:sans-serif;font-size:14px;outline:none;color:#1a1207}
.txt-btn{padding:11px 18px;border-radius:12px;background:#c9a84c;color:#fff;border:none;cursor:pointer;font-weight:700;font-size:16px}

.prezzo-box{background:#f0f9ff;border:1px solid #bae6fd;border-radius:10px;padding:10px 14px;margin:6px 0;font-family:sans-serif}
.prezzo-label{font-size:11px;color:#0369a1;text-transform:uppercase;letter-spacing:1px;margin-bottom:2px}
.prezzo-val{font-size:22px;font-weight:700;color:#1a1207}
.prezzo-det{font-size:11px;color:#888;margin-top:2px}
.prezzo-note{font-size:11px;color:#0369a1;margin-top:4px}
.wa-btn{width:100%;margin-top:8px;padding:11px;border-radius:12px;background:#f0fdf4;border:1px solid #86efac;color:#15803d;font-family:sans-serif;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px}
.riepilogo{background:#fdf5e0;border:1px solid rgba(201,168,76,.3);border-radius:12px;padding:14px 16px;margin-bottom:12px;font-family:sans-serif;font-size:13px;line-height:2}
.stima-box{margin-top:6px;padding:8px 10px;background:#fff;border-radius:8px;border:1px solid #e8d88a}
.stima-label{color:#0369a1;font-size:12px}
.stima-val{font-size:16px;font-weight:700;color:#1a1207}
.stima-note{color:#aaa;font-size:11px;display:block;margin-top:2px}
.pay-stripe{width:100%;padding:14px;border-radius:12px;background:#635bff;color:#fff;border:none;font-family:sans-serif;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:8px}
.pay-wa{width:100%;padding:13px;border-radius:12px;background:#25D366;color:#fff;border:none;font-family:sans-serif;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:8px}

.btn-reset{width:100%;margin-top:8px;padding:10px;border-radius:12px;background:transparent;border:1px solid #e0d8cc;font-family:sans-serif;font-size:13px;color:#888;cursor:pointer}
.done-box{text-align:center;padding:20px}
.done-emoji{font-size:40px;margin-bottom:8px}
.done-title{font-weight:700;font-size:16px;color:#1a1207;margin-bottom:4px}
.done-sub{font-size:13px;color:#888;margin-bottom:14px}
.done-btn{padding:10px 24px;border-radius:20px;background:#1a1207;color:#c9a84c;border:none;font-family:sans-serif;font-weight:700;cursor:pointer}
/* Stripe */
.stripe-wrap{padding:4px 0}
.stripe-header{background:#fdf5e0;border:1px solid rgba(201,168,76,.3);border-radius:10px;padding:10px 14px;margin-bottom:12px;font-family:sans-serif;font-size:13px}
.stripe-pay-title{font-weight:700;color:#1a1207;margin-bottom:2px}
.stripe-pay-amount{color:#666}
.stripe-pay-amount strong{font-size:16px;color:#1a1207}
.stripe-pay-det{font-size:11px;color:#888;margin-top:2px}
#stripe-element{margin-bottom:12px;min-height:50px}
.stripe-pay-btn{width:100%;padding:14px;border-radius:12px;background:#635bff;color:#fff;border:none;font-family:sans-serif;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
.stripe-pay-btn:disabled{background:#ccc;cursor:not-allowed}
.stripe-cancel{width:100%;margin-top:8px;padding:10px;border-radius:12px;background:transparent;border:1px solid #e0d8cc;font-family:sans-serif;font-size:13px;color:#888;cursor:pointer}
.stripe-secure{text-align:center;margin-top:8px;font-family:sans-serif;font-size:10px;color:#bbb}
.stripe-error{color:#ef4444;font-family:sans-serif;font-size:12px;margin-bottom:8px;padding:8px;background:#fef2f2;border-radius:8px}

/* Settings modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:999;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:#fff;border-radius:16px;padding:24px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,.4)}

.modal-sub{font-family:sans-serif;font-size:12px;color:#888;margin-bottom:16px;line-height:1.6}
.modal-label{font-family:sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#666;display:block;margin-bottom:6px}

.modal-tip{background:#f0f9ff;border-radius:8px;padding:10px 12px;margin-bottom:16px;font-family:sans-serif;font-size:12px;color:#0369a1;line-height:1.5}
.modal-btns{display:flex;gap:8px}
.modal-save{flex:1;padding:12px;border-radius:10px;background:#1a1207;color:#c9a84c;border:none;font-family:sans-serif;font-weight:700;font-size:14px;cursor:pointer}
.modal-cancel{flex:1;padding:12px;border-radius:10px;background:transparent;border:1px solid #e0d8cc;font-family:sans-serif;font-size:14px;color:#666;cursor:pointer}
.nota-consegna{font-family:sans-serif;font-size:11px;color:#8a8a8a;text-align:center;padding:6px 4px 2px;line-height:1.4}
.footer{text-align:center;margin-top:14px;color:#555;font-family:sans-serif;font-size:11px}

/* LINK UNICO — menu iniziale (bio Instagram / Google) */
#startmenu{position:absolute;inset:0;background:linear-gradient(160deg,#111827 0%,#1f2937 60%,#111827 100%);z-index:50;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px 22px;text-align:center}
.sm-logo{font-size:52px;margin-bottom:6px}
.sm-title{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:26px;color:#fff;letter-spacing:-0.5px}
.sm-sub{font-family:'DM Mono',monospace;font-size:11px;color:#C9A84C;margin:4px 0 26px;letter-spacing:1px;text-transform:uppercase}
.sm-btn{display:flex;align-items:center;gap:12px;width:100%;max-width:300px;background:#fff;border:none;border-radius:16px;padding:15px 18px;margin-bottom:12px;cursor:pointer;text-align:left;box-shadow:0 4px 14px rgba(0,0,0,.25);transition:transform .12s}
.sm-btn:active{transform:scale(.97)}
.sm-ico{font-size:24px}
.sm-txt{flex:1}
.sm-t1{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:15px;color:#111827}
.sm-t2{font-family:'DM Mono',monospace;font-size:10px;color:#6b7280;margin-top:1px}
.sm-btn.gold{background:#C9A84C}
.sm-btn.gold .sm-t1{color:#111827}
.sm-btn.gold .sm-t2{color:#4b3d12}
.sm-btn.wa{background:#25d366}
.sm-btn.wa .sm-t1{color:#fff}
.sm-btn.wa .sm-t2{color:#eafff1}
.sm-foot{font-family:'DM Mono',monospace;font-size:10px;color:#9ca3af;margin-top:14px}

.phone{position:relative}
</style>
</head>

var CONSEGNA_VICINO = 10;    // Roma, entro 15 km

var COSTO_CONSEGNA = 10;     // compatibilità: catalogo vecchio con prezzo unico

  "Ohana":30,"Pastiera":30,"Serendipity":35,"Settembrina":35,"Sveva":35,
  "Tiramisù fragole":30,"Ugly cake":30,"Zuccotto":27
};
var FARCITURE = ["Crema pasticciera","Crema chantilly","Crema al cioccolato","Fragole fresche","Frutti di bosco","Pistacchio","Nocciola","Nessuna particolare"];
var DECORAZIONI = ["Classica con panna","Frutta fresca","Cioccolato e riccioli","Fiori di zucchero","Minimal elegante","Pasta di zucchero","Nessuna particolare"];
var ORARI = ["08:00","08:30","09:00","09:30","10:00","10:30","11:00","11:30","12:00","12:30","13:00","14:00","15:00","16:00","17:00","18:00","19:00"];
var GIORNI_IT = ["Dom","Lun","Mar","Mer","Gio","Ven","Sab"];
var MESI_IT = ["gen","feb","mar","apr","mag","giu","lug","ago","set","ott","nov","dic"];

// ─── STATE ────────────────────────────────────────────────────────────────────
var stato = {
  step: "giorno",
  ordine: {},
  giorni: []
};

// ─── UTILS ────────────────────────────────────────────────────────────────────
function getGiorni(){
  var g=[],oggi=new Date(),d=new Date(oggi);
  d.setDate(d.getDate()+1);
  while(g.length<8){if(d.getDay()!==1)g.push(new Date(d));d.setDate(d.getDate()+1);}
  return g;
}
function fmtG(d){return GIORNI_IT[d.getDay()]+" "+d.getDate()+" "+MESI_IT[d.getMonth()];}
function kgPerPersone(n){return n*KG_PERSONA;}
function costoConsegnaScelto(){
  var c = Number(stato.ordine.costoConsegna);
  return isNaN(c) ? CONSEGNA_VICINO : c;
}
function prezzoStimato(torta,persone,consegna){
  var pk=LISTINO[torta]||30;
  var base=pk*kgPerPersone(persone)+(consegna?costoConsegnaScelto():0);
  return{low:Math.round(base*STIMA_MIN),high:Math.round(base*STIMA_MAX),base:Math.round(base),pk:pk};
}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function scrollChat(){
  var c=document.getElementById("chat");
  if(c)c.scrollTop=c.scrollHeight;
}

function addBot(text){
  var c=document.getElementById("chat");
  var row=document.createElement("div");
  row.className="bot-row";
  row.innerHTML='<div class="bot-avatar">🎂</div><div class="bot-bubble">'+esc(text)+'</div>';
  c.appendChild(row);
  scrollChat();
}
function addUser(text){
  var c=document.getElementById("chat");
  var row=document.createElement("div");
  row.className="user-row";
  row.innerHTML='<div class="user-bubble">'+esc(text)+'</div>';
  c.appendChild(row);
  scrollChat();
}
function showTyping(){
  var c=document.getElementById("chat");
  var t=document.createElement("div");
  t.className="typing";t.id="typing";
  t.innerHTML='<div class="bot-avatar">🎂</div><div class="typing-bubble"><div class="dot" style="animation:bounce 1.2s 0s infinite"></div><div class="dot" style="animation:bounce 1.2s .2s infinite"></div><div class="dot" style="animation:bounce 1.2s .4s infinite"></div></div>';
  c.appendChild(t);scrollChat();
}
function hideTyping(){var t=document.getElementById("typing");if(t)t.remove();}
function botThen(text,delay){
  delay=delay||800;
  showTyping();
  setTimeout(function(){hideTyping();addBot(text);renderControls();},delay);
}
function scegliConsegna(costo, zona){
  addUser("🚗 Consegna " + zona + " (+€" + costo + ")");
  stato.ordine.consegna = true;
  stato.ordine.costoConsegna = costo;
  stato.ordine.zonaConsegna = zona;
  stato.step = "torta";
  document.getElementById("controls").innerHTML = "";
  showTyping();
  setTimeout(function(){
    hideTyping();
    addBot("Consegna a " + zona + "! 🚗\n\nTi chiederemo l'indirizzo su WhatsApp.\n\nQuale torta desideri?");
    renderControls();
  }, 800);
}

function pick(label,key,val,next,msg){
  addUser(label);
  stato.ordine[key]=val;
  if(key==="consegna" && val===false){ stato.ordine.costoConsegna=0; stato.ordine.zonaConsegna=""; }
  stato.step=next;
  document.getElementById("controls").innerHTML="";
  showTyping();
  setTimeout(function(){hideTyping();addBot(msg);renderControls();},800);

// ─── CATALOGO DA FIRESTORE (bot_app/catalogo, pubblicato dal hub) ─────────────
function pubblicaMioUrl(){
  // Come la shop-app WorkMor: il link unico si genera da solo dall'indirizzo della pagina.
  try{
    if(!db) return;
    var host=location.hostname||"";
    if(location.protocol.indexOf("http")!==0) return;              // niente file://
    if(host==="localhost"||host==="127.0.0.1"||host==="") return;  // niente ambienti locali
    var u=location.origin+location.pathname;
    db.collection("bot_app").doc("catalogo").set({ pageUrl:u }, { merge:true }).catch(function(){});
  }catch(e){}
}
var catalogoOk = false;
var tentativiCat = 0;

/* Legge bot_app/catalogo e applica i parametri pubblicati dalla Suite.
   Robusto per reti lente: il menu viene ri-sincronizzato ogni volta che i
   dati arrivano davvero, anche dopo il fallback, e il get() viene ritentato. */
function applicaCatalogo(c){
  if(Array.isArray(c.listino) && c.listino.length){
    var L = {};
    c.listino.forEach(function(t){ if(t && t.nome) L[t.nome] = Number(t.prezzoKg) || 30; });
    if(Object.keys(L).length) LISTINO = L;
  }
  if(Array.isArray(c.farciture) && c.farciture.length) FARCITURE = c.farciture;
  if(Array.isArray(c.decorazioni) && c.decorazioni.length) DECORAZIONI = c.decorazioni;
  if(Array.isArray(c.orari) && c.orari.length) ORARI = c.orari;
  if(c.costoConsegna !== undefined && c.costoConsegna !== null){
    COSTO_CONSEGNA = Number(c.costoConsegna) || 0;
    CONSEGNA_VICINO = COSTO_CONSEGNA;   // se il catalogo ha solo il prezzo unico
  }
  if(c.consegnaVicino !== undefined && c.consegnaVicino !== null) CONSEGNA_VICINO = Number(c.consegnaVicino) || 0;
  if(c.consegnaLontano !== undefined && c.consegnaLontano !== null) CONSEGNA_LONTANO = Number(c.consegnaLontano) || 0;
  if(c.kgPersona) KG_PERSONA = Number(c.kgPersona) || 0.15;
  if(c.stimaMin) STIMA_MIN = Number(c.stimaMin) / 100;
  if(c.stimaMax) STIMA_MAX = Number(c.stimaMax) / 100;
  if(c.waNumber){ var w = String(c.waNumber).replace(/[^0-9]/g, ""); if(w) WA_NUMBER = w; }
  if(c.shopUrl) SHOP_URL = String(c.shopUrl);
  catalogoOk = true;
}

function fetchCatalogo(fine){
  tentativiCat++;
  db.collection("bot_app").doc("catalogo").get().then(function(snap){
    if(snap.exists) applicaCatalogo(snap.data() || {});
    if(fine) fine();
    aggiornaMenu();   // fondamentale: i dati possono arrivare dopo il fallback
  }).catch(function(e){
    console.warn("Catalogo non caricato (tentativo " + tentativiCat + "):", e);
    if(fine) fine();
    aggiornaMenu();
    if(tentativiCat < 3) setTimeout(function(){ fetchCatalogo(null); }, 2500);
  });
}

function caricaCatalogo(cb){
  pubblicaMioUrl();
  var done = false;
  function fine(){ if(!done){ done = true; cb(); } }
  setTimeout(fine, 4000);              // il bot parte coi default se la rete è lenta
  if(!db){ fine(); return; }
  fetchCatalogo(fine);
  // Rete lenta: se dopo 6s non è ancora arrivato nulla, ritenta (max 3 volte)
  setTimeout(function(){ if(!catalogoOk && tentativiCat < 3) fetchCatalogo(null); }, 6000);
}
// ─── SALVA ORDINE SU FIRESTORE (collezione "ordini" → agenda Dashboard) ───────
/* Salva l'ordine nella collection "ordini": la stessa dell'app Ordini Fagotti.
   Così l'ordine dal bot compare nell'agenda della Dashboard, nell'app Ordini
   sul tablet e nella stampa del laboratorio — non più in un elenco separato.
   Schema identico a quello che scrive l'app Ordini (modo "pers"). */
function salvaOrdineFirestore(pagato){
  try{
    if(!db) return;
    var o = stato.ordine;
    var p = prezzoStimato(o.torta, o.persone, o.consegna);
    var id = String(Date.now());
    var note = [];
    if(o.scritta) note.push('Scritta: "' + o.scritta + '"');
    if(o.consegna) note.push("Consegna " + (o.zonaConsegna || "Roma") + " (+€" + costoConsegnaScelto() + ")");
    note.push("Ordine dal bot WhatsApp");
    if(p && p.base) note.push("Stima bot: €" + p.base);

    db.collection("ordini").doc(id).set({
      id: id,
      cliente: o.nome || "Cliente dal bot",
      telefono: o.telefono || "",
      data: o.dataISO || "",
      orario: o.orario || "",
      consegna: !!o.consegna,
      prodotto: o.torta || "",
      modo: "pers",
      peso: "1kg",
      persone: Number(o.persone) || 8,
      grammi: Math.round((KG_PERSONA || 0.15) * 1000),
      qtaTorte: 1,
      pezzi: 1,
      prezzoKg: Number(LISTINO[o.torta]) || 30,
      farcitura: o.farcitura || "",
      decorazione: o.decorazione || "",
      note: note.join(" · "),
      creato: Date.now()
    }).catch(function(e){ console.warn("Salvataggio ordine:", e); });
  }catch(e){ console.warn("Salvataggio ordine:", e); }
}

// ─── STRIPE ───────────────────────────────────────────────────────────────────
function loadStripeJS(cb){
  if(window.Stripe){cb();return;}
  var s=document.createElement("script");
  s.src="https://js.stripe.com/v3/";
  s.onload=cb;
  document.head.appendChild(s);
}
function initStripeElement(importo){
  loadStripeJS(function(){
    try{
      stripeInstance=window.Stripe(stripeKey);
      stripeElements=stripeInstance.elements({
        mode:"payment",amount:importo*100,currency:"eur",
        appearance:{theme:"stripe",variables:{colorPrimary:"#c9a84c",borderRadius:"10px"}}
      });
      stripePaymentEl=stripeElements.create("payment");
      stripePaymentEl.mount("#stripe-element");
      stripePaymentEl.on("ready",function(){
        var l=document.getElementById("stripe-loading");if(l)l.style.display="none";
        var b=document.getElementById("stripe-pay-btn");if(b)b.style.display="flex";
      });
    }catch(e){
      var l=document.getElementById("stripe-loading");if(l)l.style.display="none";
      var er=document.getElementById("stripe-error");if(er){er.textContent="Chiave Stripe non valida: "+e.message;er.style.display="block";}
    }
  });
}
async function doStripePay(){
  if(!stripeInstance||!stripeElements)return;
  var btn=document.getElementById("stripe-pay-btn");
  var err=document.getElementById("stripe-error");
  if(btn)btn.disabled=true;
  if(btn)btn.textContent="Elaborazione…";
  if(err)err.style.display="none";
  var res=await stripeElements.submit();
  if(res.error){
    if(err){err.textContent=res.error.message;err.style.display="block";}
    if(btn){btn.disabled=false;btn.textContent="💳 Paga";}
    return;
  }
  var res2=await stripeInstance.confirmPayment({
    elements:stripeElements,
    confirmParams:{return_url:window.location.href,
      payment_method_data:{billing_details:{name:stato.ordine.nome||"Cliente Fagotti"}}}
  });
  if(res2.error){
    if(err){err.textContent=res2.error.message;err.style.display="block";}
    if(btn){btn.disabled=false;var p=prezzoStimato(stato.ordine.torta,stato.ordine.persone,stato.ordine.consegna);btn.textContent="💳 Paga €"+p.base+".00";}
  }else{
    salvaOrdineFirestore(true);
    addUser("💳 Pagamento completato!");
    stato.step="completato";
    showTyping();
    setTimeout(function(){hideTyping();addBot("Pagamento ricevuto! 🎉\n\nGrazie "+stato.ordine.nome+", il tuo ordine è confermato.\nTi aspettiamo in pasticceria! 💛");renderControls();},700);
  }
}

stato.giorni=getGiorni();
